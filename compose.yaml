name: backend-learning-mini-saas

services:
  postgres:
    image: postgres:17-bookworm
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - '${POSTGRES_PORT}:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}']
      interval: 2s
      timeout: 5s
      retries: 10
      start_period: 5s

  migrate:
    image: backend-learning/mini-saas:local
    build:
      context: .
      dockerfile: apps/mini-saas/Dockerfile
    command:
      [
        'node',
        'node_modules/typeorm/cli.js',
        'migration:run',
        '-d',
        'dist/database/data-source.js',
      ]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    depends_on:
      postgres:
        condition: service_healthy
    restart: 'no'

  api:
    image: backend-learning/mini-saas:local
    build:
      context: .
      dockerfile: apps/mini-saas/Dockerfile
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      SESSION_SECRET: ${SESSION_SECRET}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN}
    ports:
      - '${API_PORT}:3000'
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:3000/health').then((response) => { if (!response.ok) process.exit(1); }).catch(() => process.exit(1));",
        ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

volumes:
  postgres-data:
